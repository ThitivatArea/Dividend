<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>พอร์ตหุ้น & ปันผล</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0F11;
  --surface: #18181C;
  --surface2: #222228;
  --surface3: #2A2A32;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #F0EFE8;
  --text2: #9B9A94;
  --text3: #5A5A60;
  --accent: #3DBA7E;
  --accent-dim: rgba(61,186,126,0.12);
  --green: #3DBA7E;
  --green-bg: rgba(61,186,126,0.15);
  --green-text: #5DD49A;
  --amber: #E8A83A;
  --amber-bg: rgba(232,168,58,0.15);
  --amber-text: #F0BE65;
  --red: #E85A5A;
  --red-bg: rgba(232,90,90,0.15);
  --red-text: #F07878;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Sans Thai', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
/* ── Header ── */
header {
  background: rgba(15,15,17,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 960px;
  margin: 0 auto;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 9px;
  color: var(--text);
}
.logo-icon {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.header-btn {
  background: var(--accent);
  color: #0a2518;
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 16px;
  font-size: 14px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.header-btn:hover { opacity: 0.85; }
/* ── Main ── */
main {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}
/* ── Summary ── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
@media (min-width: 600px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
.metric-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 16px;
  border: 1px solid var(--border);
}
.metric-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.metric-value { font-size: 22px; font-weight: 600; color: var(--text); font-family: 'IBM Plex Mono', monospace; line-height: 1.2; }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.metric-card.highlight .metric-value { color: var(--green-text); }
/* ── Section ── */
.section-header { margin-bottom: 12px; }
.section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
/* ── Mobile cards ── */
.stock-list { display: flex; flex-direction: column; gap: 10px; }
.stock-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
}
.card-top { padding: 14px 16px 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.card-ticker { font-size: 18px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; color: var(--text); line-height: 1.2; }
.card-name { font-size: 12px; color: var(--text3); margin-top: 2px; }
.card-actions { display: flex; gap: 4px; }
.icon-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--surface2); border-color: var(--border2); }
.icon-btn.del:hover { background: var(--red-bg); border-color: rgba(232,90,90,0.25); }
.card-stats { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--border); }
.stat-cell { padding: 10px 14px; border-right: 1px solid var(--border); }
.stat-cell:last-child { border-right: none; }
.stat-label { font-size: 10px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.stat-val { font-size: 13px; font-weight: 500; font-family: 'IBM Plex Mono', monospace; color: var(--text); }
.card-bottom { padding: 10px 14px 14px; border-top: 1px solid var(--border); }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 7px; }
.progress-bar { height: 5px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.badge { display: inline-flex; align-items: center; font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 99px; font-family: 'IBM Plex Mono', monospace; }
.badge-green { background: var(--green-bg); color: var(--green-text); }
.badge-amber { background: var(--amber-bg); color: var(--amber-text); }
.badge-red { background: var(--red-bg); color: var(--red-text); }
.badge-none { background: var(--surface3); color: var(--text3); }
/* ── Desktop table ── */
.table-wrap {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  display: none;
}
@media (min-width: 720px) { .stock-list { display: none; } .table-wrap { display: block; } }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  padding: 11px 14px;
  text-align: right;
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  white-space: nowrap;
}
thead th:first-child { text-align: left; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }
tbody td { padding: 12px 14px; text-align: right; color: var(--text); white-space: nowrap; font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
tbody td:first-child { text-align: left; font-family: inherit; }
.td-ticker { font-weight: 600; font-size: 14px; font-family: 'IBM Plex Mono', monospace; }
.td-name { font-size: 11px; color: var(--text3); font-family: inherit; margin-top: 1px; }
.tbl-progress-bar { height: 3px; background: var(--surface3); border-radius: 99px; overflow: hidden; margin-top: 4px; }
.tbl-progress-fill { height: 100%; border-radius: 99px; background: var(--accent); }
/* ── Empty ── */
.empty-state { padding: 52px 20px; text-align: center; }
.empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.25; }
.empty-title { font-size: 15px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
.empty-desc { font-size: 13px; color: var(--text3); }
/* ── Chart ── */
.chart-section { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-top: 12px; }
.chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 100px; margin-top: 12px; padding: 0 2px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.bar-label { font-size: 10px; color: var(--text3); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 200;
  padding: 20px;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
@media (min-width: 600px) { .modal-overlay { align-items: center; } }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  width: 100%;
  max-width: 500px;
  padding: 22px;
  animation: slideUp 0.22s cubic-bezier(.4,0,.2,1);
  position: relative;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-title { font-size: 16px; font-weight: 600; color: var(--text); }
.modal-close {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-size: 16px;
  color: var(--text3);
  transition: all 0.15s;
  line-height: 1;
}
.modal-close:hover { background: var(--surface3); color: var(--text); }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.field label { display: block; font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.03em; }
.field input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(61,186,126,0.15);
}
.field input::placeholder { color: var(--text3); }
.modal-divider { height: 1px; background: var(--border); margin: 4px 0 14px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn { padding: 9px 20px; border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #0a2518; font-weight: 600; }
.btn-primary:hover { opacity: 0.88; }
.btn-ghost { background: transparent; border-color: var(--border2); color: var(--text2); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">📈</div>
      พอร์ตหุ้น & ปันผล
    </div>
    <button class="header-btn" onclick="openAddModal()">+ เพิ่มหุ้น</button>
  </div>
</header>

<main>
  <div class="summary-grid">
    <div class="metric-card">
      <div class="metric-label">มูลค่าพอร์ต</div>
      <div class="metric-value" id="s-port">฿0</div>
      <div class="metric-sub" id="s-count">0 ตัว</div>
    </div>
    <div class="metric-card highlight">
      <div class="metric-label">ปันผลทั้งปี</div>
      <div class="metric-value" id="s-annual">฿0</div>
      <div class="metric-sub">รวมทุกตัว</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Yield เฉลี่ย</div>
      <div class="metric-value" id="s-yield">0.00%</div>
      <div class="metric-sub">ถ่วงน้ำหนักตลาด</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">รับแล้วปีนี้</div>
      <div class="metric-value" id="s-recv">฿0</div>
      <div class="metric-sub" id="s-recv-pct">คิดเป็น 0%</div>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title">รายการหุ้น</span>
  </div>

  <div class="stock-list" id="stock-list"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>หุ้น</th>
          <th>จำนวน</th>
          <th>ราคาซื้อ</th>
          <th>ราคาตลาด</th>
          <th>มูลค่า</th>
          <th>ปันผล/ปี</th>
          <th>Yield ต้นทุน</th>
          <th>Yield ตลาด</th>
          <th>รับแล้ว / เป้า</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <div class="chart-section" id="chart-section" style="display:none">
    <div class="section-title">ปันผลรายตัว — รับแล้ว vs เป้าทั้งปี</div>
    <div class="chart-bars" id="chart-bars"></div>
  </div>
</main>

<!-- Modal — ไม่มี onclick บน overlay เพื่อป้องกันปิดโดยไม่ตั้งใจ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">เพิ่มหุ้น</div>
      <button class="modal-close" onclick="closeModal()" aria-label="ปิด">✕</button>
    </div>
    <div class="modal-grid">
      <div class="field"><label>ชื่อย่อหุ้น *</label><input id="m-ticker" placeholder="PTT, CPALL, SCB…" /></div>
      <div class="field"><label>ชื่อเต็ม</label><input id="m-name" placeholder="ชื่อบริษัท" /></div>
      <div class="field"><label>จำนวนหุ้น *</label><input id="m-shares" type="number" placeholder="1000" /></div>
      <div class="field"><label>ราคาซื้อเฉลี่ย (฿) *</label><input id="m-cost" type="number" placeholder="35.50" /></div>
      <div class="field"><label>ราคาตลาดปัจจุบัน (฿)</label><input id="m-price" type="number" placeholder="38.00" /></div>
      <div class="field"><label>ปันผล/หุ้น/ปี (฿) *</label><input id="m-div" type="number" placeholder="1.50" /></div>
      <div class="field"><label>รับปันผลแล้วปีนี้ (฿)</label><input id="m-recv" type="number" placeholder="0" /></div>
      <div class="field"><label>หมายเหตุ</label><input id="m-note" placeholder="กลุ่ม, ไตรมาส…" /></div>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveStock()">บันทึก</button>
    </div>
  </div>
</div>

<script>
let stocks = [];
let editIndex = -1;
try { stocks = JSON.parse(localStorage.getItem('sdtracker_v3') || '[]'); } catch(e) {}

function save() { try { localStorage.setItem('sdtracker_v3', JSON.stringify(stocks)); } catch(e) {} }

function fmtK(n) {
  if (isNaN(n)) return '—';
  if (n >= 1000000) return '฿' + (n / 1000000).toFixed(2) + 'M';
  if (n >= 100000)  return '฿' + (n / 1000).toFixed(1) + 'K';
  return '฿' + Math.round(n).toLocaleString('th-TH');
}
function fmtMoney(n) {
  if (isNaN(n)) return '—';
  return '฿' + Math.round(n).toLocaleString('th-TH');
}
function yieldClass(y) {
  if (isNaN(y) || !isFinite(y)) return 'badge-none';
  if (y >= 5) return 'badge-green';
  if (y >= 3) return 'badge-amber';
  return 'badge-red';
}
function calc(s) {
  const shares = parseFloat(s.shares) || 0;
  const cost   = parseFloat(s.cost)   || 0;
  const price  = parseFloat(s.price)  || cost;
  const divps  = parseFloat(s.div)    || 0;
  const recv   = parseFloat(s.recv)   || 0;
  const value     = price * shares;
  const annualDiv = divps * shares;
  const yieldCost = cost  > 0 ? (divps / cost)  * 100 : NaN;
  const yieldMkt  = price > 0 ? (divps / price) * 100 : NaN;
  const remaining = Math.max(0, annualDiv - recv);
  const recvPct   = annualDiv > 0 ? Math.min(100, (recv / annualDiv) * 100) : 0;
  return { shares, cost, price, divps, recv, value, annualDiv, yieldCost, yieldMkt, remaining, recvPct };
}

function renderSummary() {
  let totalValue = 0, totalDiv = 0, totalRecv = 0;
  stocks.forEach(s => { const c = calc(s); totalValue += c.value; totalDiv += c.annualDiv; totalRecv += c.recv; });
  const avgYield = totalValue > 0 ? (totalDiv / totalValue) * 100 : 0;
  const recvPct  = totalDiv   > 0 ? (totalRecv / totalDiv)  * 100 : 0;
  document.getElementById('s-port').textContent    = fmtK(totalValue);
  document.getElementById('s-count').textContent   = stocks.length + ' ตัว';
  document.getElementById('s-annual').textContent  = fmtK(totalDiv);
  document.getElementById('s-yield').textContent   = avgYield.toFixed(2) + '%';
  document.getElementById('s-recv').textContent    = fmtK(totalRecv);
  document.getElementById('s-recv-pct').textContent = 'คิดเป็น ' + recvPct.toFixed(0) + '%';
}

function emptyHTML() {
  return `<div class="empty-state">
    <div class="empty-icon">📊</div>
    <div class="empty-title">ยังไม่มีหุ้นในพอร์ต</div>
    <div class="empty-desc">กด "เพิ่มหุ้น" ด้านบนเพื่อเริ่มต้น</div>
  </div>`;
}

function renderMobile() {
  const el = document.getElementById('stock-list');
  if (!stocks.length) { el.innerHTML = emptyHTML(); return; }
  el.innerHTML = stocks.map((s, i) => {
    const c = calc(s);
    const yc = yieldClass(c.yieldCost);
    const ym = yieldClass(c.yieldMkt);
    const ycLabel = isFinite(c.yieldCost) ? c.yieldCost.toFixed(2) + '%' : '—';
    const ymLabel = isFinite(c.yieldMkt)  ? c.yieldMkt.toFixed(2)  + '%' : '—';
    return `<div class="stock-card">
      <div class="card-top">
        <div>
          <div class="card-ticker">${s.ticker}</div>
          <div class="card-name">${s.name || '—'}${s.note ? ' · ' + s.note : ''}</div>
        </div>
        <div class="card-actions">
          <button class="icon-btn" onclick="openEditModal(${i})" aria-label="แก้ไข">✏️</button>
          <button class="icon-btn del" onclick="removeStock(${i})" aria-label="ลบ">🗑</button>
        </div>
      </div>
      <div class="card-stats">
        <div class="stat-cell"><div class="stat-label">จำนวน</div><div class="stat-val">${c.shares.toLocaleString('th-TH')}</div></div>
        <div class="stat-cell"><div class="stat-label">มูลค่า</div><div class="stat-val">${fmtK(c.value)}</div></div>
        <div class="stat-cell"><div class="stat-label">ปันผล/ปี</div><div class="stat-val">${fmtK(c.annualDiv)}</div></div>
      </div>
      <div class="card-stats">
        <div class="stat-cell"><div class="stat-label">Yield ต้นทุน</div><div class="stat-val"><span class="badge ${yc}">${ycLabel}</span></div></div>
        <div class="stat-cell"><div class="stat-label">Yield ตลาด</div><div class="stat-val"><span class="badge ${ym}">${ymLabel}</span></div></div>
        <div class="stat-cell"><div class="stat-label">ราคาตลาด</div><div class="stat-val">฿${c.price.toFixed(2)}</div></div>
      </div>
      <div class="card-bottom">
        <div class="progress-label">
          <span>รับแล้ว ${fmtMoney(c.recv)} <span style="color:var(--text3)">(${c.recvPct.toFixed(0)}%)</span></span>
          <span style="color:var(--text3)">คงเหลือ ${fmtMoney(c.remaining)}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${c.recvPct}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  if (!stocks.length) { tbody.innerHTML = `<tr><td colspan="10">${emptyHTML()}</td></tr>`; return; }
  tbody.innerHTML = stocks.map((s, i) => {
    const c  = calc(s);
    const yc = yieldClass(c.yieldCost);
    const ym = yieldClass(c.yieldMkt);
    return `<tr>
      <td><div class="td-ticker">${s.ticker}</div><div class="td-name">${s.name || ''}${s.note ? ' · '+s.note : ''}</div></td>
      <td>${c.shares.toLocaleString('th-TH')}</td>
      <td>฿${c.cost.toFixed(2)}</td>
      <td>฿${c.price.toFixed(2)}</td>
      <td>${fmtK(c.value)}</td>
      <td>${fmtK(c.annualDiv)}</td>
      <td><span class="badge ${yc}">${isFinite(c.yieldCost) ? c.yieldCost.toFixed(2)+'%' : '—'}</span></td>
      <td><span class="badge ${ym}">${isFinite(c.yieldMkt)  ? c.yieldMkt.toFixed(2)+'%'  : '—'}</span></td>
      <td>
        <div style="font-size:12px;color:var(--text2)">${fmtMoney(c.recv)} / ${fmtMoney(c.annualDiv)}</div>
        <div class="tbl-progress-bar"><div class="tbl-progress-fill" style="width:${c.recvPct}%"></div></div>
      </td>
      <td>
        <div style="display:flex;gap:4px;justify-content:flex-end">
          <button class="icon-btn" style="width:28px;height:28px;font-size:13px" onclick="openEditModal(${i})" aria-label="แก้ไข">✏️</button>
          <button class="icon-btn del" style="width:28px;height:28px;font-size:13px" onclick="removeStock(${i})" aria-label="ลบ">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderChart() {
  const sec = document.getElementById('chart-section');
  if (!stocks.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  const data = stocks.map(s => { const c = calc(s); return { ticker: s.ticker, total: c.annualDiv, recv: Math.min(c.annualDiv, c.recv) }; });
  const max  = Math.max(...data.map(d => d.total), 1);
  document.getElementById('chart-bars').innerHTML = data.map(d => {
    const totalH = Math.max(6, (d.total / max) * 88);
    const recvH  = d.total > 0 ? (d.recv  / d.total) * totalH : 0;
    const remH   = totalH - recvH;
    return `<div class="bar-col" title="${d.ticker}: รับแล้ว ${fmtMoney(d.recv)} / ${fmtMoney(d.total)}">
      <div style="display:flex;flex-direction:column;width:100%;height:${totalH}px">
        <div style="height:${remH}px;width:100%;background:var(--surface3);border-radius:4px 4px 0 0;min-height:${remH>0?2:0}px"></div>
        <div style="height:${recvH}px;width:100%;background:var(--accent);min-height:${recvH>0?2:0}px;border-radius:${recvH>=totalH?'4px 4px 0 0':0}"></div>
      </div>
      <div class="bar-label">${d.ticker}</div>
    </div>`;
  }).join('');
}

function render() { renderSummary(); renderMobile(); renderTable(); renderChart(); }

/* ── Modal ── */
function openAddModal() {
  editIndex = -1;
  document.getElementById('modal-title').textContent = 'เพิ่มหุ้น';
  ['m-ticker','m-name','m-shares','m-cost','m-price','m-div','m-recv','m-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('m-ticker').focus(), 80);
}

function openEditModal(i) {
  editIndex = i;
  const s = stocks[i];
  document.getElementById('modal-title').textContent = 'แก้ไข ' + s.ticker;
  document.getElementById('m-ticker').value = s.ticker || '';
  document.getElementById('m-name').value   = s.name   || '';
  document.getElementById('m-shares').value = s.shares || '';
  document.getElementById('m-cost').value   = s.cost   || '';
  document.getElementById('m-price').value  = s.price  || '';
  document.getElementById('m-div').value    = s.div    || '';
  document.getElementById('m-recv').value   = s.recv   || '';
  document.getElementById('m-note').value   = s.note   || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

/* Escape key closes modal */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

function saveStock() {
  const ticker = document.getElementById('m-ticker').value.trim().toUpperCase();
  const shares = document.getElementById('m-shares').value;
  const cost   = document.getElementById('m-cost').value;
  const div    = document.getElementById('m-div').value;
  if (!ticker || !shares || !cost || !div) {
    alert('กรุณากรอก: ชื่อย่อ, จำนวน, ราคาซื้อ และปันผล/หุ้น/ปี');
    return;
  }
  const obj = {
    ticker,
    name:   document.getElementById('m-name').value.trim(),
    shares, cost,
    price:  document.getElementById('m-price').value || cost,
    div,
    recv:   document.getElementById('m-recv').value || '0',
    note:   document.getElementById('m-note').value.trim()
  };
  if (editIndex >= 0) stocks[editIndex] = obj; else stocks.push(obj);
  save(); render(); closeModal();
}

function removeStock(i) {
  if (confirm('ลบ ' + stocks[i].ticker + ' ออกจากพอร์ต?')) { stocks.splice(i, 1); save(); render(); }
}

render();
</script>
</body>
</html>
